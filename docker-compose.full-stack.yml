# 知枢 RAG 平台全栈部署示例
# 包含: backend + server + frontend + admin-frontend + postgresql + redis
#
# 使用方式:
#   1. 复制 .env.example 到 .env 并修改配置
#   2. docker compose -f docker-compose.full-stack.yml up -d
#   3. 访问 http://localhost:3000 (用户端) 或 http://localhost:3001 (管理端)

services:
  # ============ 基础设施 ============
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: rag_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_platform"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - rag-network

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - rag-network

  # ============ 后端服务 ============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    environment:
      - SECRET_KEY=${BACKEND_SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://rag:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/rag_platform
      - REDIS_URL=redis://redis:6379/1
      - VECTOR_STORE_TYPE=${VECTOR_STORE_TYPE:-chroma}
      - CHROMA_DATA_DIR=/app/data/chroma
      - UPLOAD_DIR=/app/uploads
      - CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      - CENTRAL_SERVER_URL=${CENTRAL_SERVER_URL:-http://server:8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - rag-network

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-celery-worker
    command: celery -A app.celery_app:celery worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://rag:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/rag_platform
      - REDIS_URL=redis://redis:6379/1
      - SECRET_KEY=${BACKEND_SECRET_KEY}
      - CHROMA_DATA_DIR=/app/data/chroma
      - UPLOAD_DIR=/app/uploads
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rag-server
    environment:
      - SECRET_KEY=${SERVER_SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://rag:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/rag_central
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=${SERVER_CORS_ORIGINS:-http://localhost:3001}
      - ADMIN_EMAIL=${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - server_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - rag-network

  # ============ 前端服务 ============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_TARGET=http://backend:8000
    container_name: rag-frontend
    depends_on:
      - backend
    networks:
      - rag-network

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_TARGET=http://server:8080
    container_name: rag-admin-frontend
    depends_on:
      - server
    networks:
      - rag-network

  # ============ Nginx 网关 ============
  nginx:
    image: nginx:alpine
    container_name: rag-nginx
    ports:
      - "3000:3000"   # 用户端
      - "3001:3001"   # 管理端
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - admin-frontend
      - backend
      - server
    networks:
      - rag-network

volumes:
  postgres_data:
  redis_data:
  backend_data:
  backend_uploads:
  server_uploads:

networks:
  rag-network:
    driver: bridge
