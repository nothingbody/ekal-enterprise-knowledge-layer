<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: transparent;
    -webkit-app-region: drag;
    user-select: none;
  }
  .splash {
    width: 380px;
    padding: 48px 36px;
    background: #0f172a; /* Slate 900 */
    border: 1px solid #1e293b; /* Slate 800 */
    border-radius: 12px;
    box-shadow: 0 20px 40px -8px rgba(0,0,0,0.4), 0 8px 16px -4px rgba(0,0,0,0.3);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  /* Subtle glow in the background */
  .splash::before {
    content: '';
    position: absolute;
    top: -50px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(22, 93, 255, 0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .logo {
    position: relative;
    width: 52px;
    height: 52px;
    margin: 0 auto 28px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 10px 24px rgba(13, 143, 215, 0.35);
    z-index: 1;
  }
  .logo img {
    width: 100%;
    height: 100%;
    display: block;
  }
  h1 {
    position: relative;
    font-size: 20px;
    font-weight: 700;
    color: #f8fafc; /* Slate 50 */
    margin-bottom: 8px;
    letter-spacing: -0.02em;
    z-index: 1;
  }
  .subtitle {
    position: relative;
    font-size: 13px;
    color: #94a3b8; /* Slate 400 */
    margin-bottom: 36px;
    font-weight: 400;
    z-index: 1;
  }
  .progress-bar {
    position: relative;
    height: 2px;
    background: #1e293b; /* Slate 800 */
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
    z-index: 1;
  }
  .progress-fill {
    height: 100%;
    width: 30%;
    background: linear-gradient(90deg, transparent, #165dff, #6aa1ff);
    border-radius: 2px;
    animation: loading 1.5s ease-in-out infinite;
    box-shadow: 0 0 8px rgba(22, 93, 255, 0.6);
  }
  .status {
    position: relative;
    font-size: 11px;
    color: #64748b; /* Slate 500 */
    font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    z-index: 1;
  }
  @keyframes loading {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
</style>
</head>
<body>
  <div class="splash">
    <div class="logo">
      <img src="icon.png" alt="" />
    </div>
    <h1>企业多模态知识协作共享服务平台</h1>
    <p class="subtitle">企业级多模态知识协作共享平台</p>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <p class="status">Starting Engine...</p>
  </div>
</body>
</html>
