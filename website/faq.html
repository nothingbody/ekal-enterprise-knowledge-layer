  <style>
    .faq-hero {
      position: relative; padding: 88px 24px 64px; text-align: center; overflow: hidden;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 8px),
        linear-gradient(135deg, #1a1f4e 0%, #253a80 30%, #5568a8 60%, #8868b0 100%);
      color: #fff;
    }
    .faq-hero::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
      background: linear-gradient(to bottom, transparent, #f5f6fa);
      pointer-events: none;
    }
    .faq-hero .section-tag {
      background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(8px);
    }
    .faq-hero h1 {
      font-size: 36px; font-weight: 700; margin-bottom: 12px;
      text-shadow: 0 0 40px rgba(255,255,255,0.15);
    }
    .faq-hero p { font-size: 16px; color: rgba(255,255,255,0.6); max-width: 480px; margin: 0 auto; }

    .faq-body { padding: 60px 0 80px; background: #f5f6fa; }
    .faq-list-wrap { max-width: 760px; margin: 0 auto; padding: 0 24px; }

    .faq-item {
      background: #fff; border: 1px solid var(--border); border-radius: 12px;
      margin-bottom: 12px; overflow: hidden; transition: all .3s;
    }
    .faq-item:hover { border-color: rgba(0,0,0,0.12); }
    .faq-item[open] { box-shadow: 0 4px 20px rgba(0,0,0,0.06); border-color: transparent; }

    .faq-item summary {
      padding: 18px 22px; font-size: 15px; font-weight: 600;
      cursor: pointer; color: var(--text); list-style: none;
      display: flex; align-items: center; justify-content: space-between;
      transition: color .2s; line-height: 1.5;
    }
    .faq-item summary::-webkit-details-marker { display: none; }
    .faq-item summary::after {
      content: '+'; font-size: 22px; font-weight: 300; color: var(--text-muted);
      transition: all .25s; flex-shrink: 0; margin-left: 16px;
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; background: var(--bg-surface);
    }
    .faq-item[open] summary::after { content: '−'; color: #fff; background: var(--primary); }
    .faq-item[open] summary { color: var(--primary); }

    .faq-answer {
      padding: 0 22px 18px; font-size: 14.5px; color: var(--text-secondary);
      line-height: 1.8; border-top: 1px solid var(--border);
    }
    .faq-answer p { margin: 0; padding-top: 16px; }

    .faq-loading { text-align: center; padding: 80px 0; color: #888; }
    .loading-spinner {
      width: 36px; height: 36px; margin: 0 auto 16px;
      border: 3px solid #e5e7eb; border-top-color: var(--primary);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .faq-error { text-align: center; padding: 80px 0; color: #ef4444; }
    .faq-error button {
      margin-top: 12px; padding: 10px 28px; border: 1px solid var(--border);
      border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px;
      transition: all .2s;
    }
    .faq-error button:hover { background: var(--bg-surface); border-color: var(--primary); color: var(--primary); }

    .faq-empty { text-align: center; padding: 80px 0; color: var(--text-muted); font-size: 15px; }

    @media (max-width: 768px) {
      .faq-hero h1 { font-size: 26px; }
      .faq-hero { padding: 72px 24px 48px; }
    }
  </style>

  <script src="marked.umd.js"></script>
  <script>
    marked.use({ breaks: true });

    function renderFaq(items) {
      var list = document.getElementById('faq-list');
      list.innerHTML = '';
      if (!items.length) {
        list.innerHTML = '<div class="faq-empty">暂无常见问题</div>';
        return;
      }
      items.forEach(function(item, idx) {
        var details = document.createElement('details');
        details.className = 'faq-item fade-in';
        var summary = document.createElement('summary');
        summary.textContent = item.title;
        var answer = document.createElement('div');
        answer.className = 'faq-answer';
        if (item.body) {
          try { answer.innerHTML = marked.parse(item.body); }
          catch(e) { answer.innerHTML = '<p>' + item.body + '</p>'; }
        } else {
          answer.innerHTML = '<p>暂无回答</p>';
        }
        details.appendChild(summary);
        details.appendChild(answer);
        list.appendChild(details);
      });

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
          if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.faq-item').forEach(function(el) { observer.observe(el); });
    }

    var FALLBACK_FAQ = [
      { title: '知枢是免费的吗？', body: '是的，知枢完全免费。唯一的费用是 LLM API 调用费用（如 OpenAI、Claude 等），如果使用本地模型（如 Ollama）则完全免费。' },
      { title: '数据安全如何保障？', body: '知枢支持 100% 私有部署，所有数据保存在你自己的服务器或本地电脑上。API Key 加密存储，支持两步验证 (2FA)，完整的操作审计日志，JWT 令牌黑名单机制。' },
      { title: '支持哪些 AI 模型？', body: '支持所有 OpenAI 兼容接口的模型，包括 GPT-4o、Claude、DeepSeek、通义千问等主流大模型。也支持通过 Ollama 运行本地模型（如 Llama、Qwen 等），实现完全离线使用。' },
      { title: '桌面版和服务器版有什么区别？', body: '桌面版适合个人使用，一键安装开箱即用，数据保存在本地。服务器版适合团队/企业，支持多用户管理、工作空间协作、设备管理、用量统计等功能，使用 Docker Compose 部署。' },
      { title: '如何从其他平台迁移？', body: '知枢支持知识库的导入导出功能，可以将文档批量上传。对于已有的向量数据库，可以通过 API 进行数据迁移。' },
      { title: '支持多少种文档格式？', body: '支持 15+ 种格式：PDF、Word (.doc/.docx)、Excel (.xls/.xlsx)、PPT (.pptx)、Markdown、HTML、TXT、CSV、JSON、XML、Python/JS/Java 等代码文件、图片（OCR）。' },
      { title: '可以接入哪些消息渠道？', body: '目前支持企业微信、钉钉、飞书、Telegram、Discord、Slack 等主流平台，通过 Webhook 配置即可接入。' },
      { title: '有技术支持吗？', body: '你可以通过邮件联系技术支持团队。我们也提供详细的使用文档和 FAQ 帮助你快速上手。' }
    ];

    function loadFaq() {
      var loading = document.getElementById('faq-loading');
      if (loading) loading.style.display = '';
      fetch('/api/v1/site/public/faq?page_size=50')
        .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function(data) {
          var items = data.items || [];
          renderFaq(items.length ? items : FALLBACK_FAQ);
        })
        .catch(function() {
          renderFaq(FALLBACK_FAQ);
        });
    }
    loadFaq();
  </script>
