name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            shared-frontend/package-lock.json
            frontend/package-lock.json

      - name: Build shared frontend package
        working-directory: shared-frontend
        run: |
          npm ci --prefer-offline
          npm run build

      - run: npm ci --prefer-offline
      - run: npm run build

  admin-frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            shared-frontend/package-lock.json
            admin-frontend/package-lock.json

      - name: Build shared frontend package
        working-directory: shared-frontend
        run: |
          npm ci --prefer-offline
          npm run build

      - run: npm ci --prefer-offline
      - run: npm run build

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Backend dependencies
        run: |
          pip install -r backend/requirements.txt --quiet
          pip-audit --desc || true

      - name: Audit Server dependencies
        run: |
          pip install -r server/requirements.txt --quiet
          pip-audit --desc || true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit Frontend dependencies
        run: cd frontend && npm audit --audit-level=high || true

      - name: Audit Admin-Frontend dependencies
        run: cd admin-frontend && npm audit --audit-level=high || true
