# version 已废弃，Docker Compose v2+ 不再需要
x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    <<: *common
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: rag_central
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_central"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    <<: *common
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    <<: *common
    build:
      context: ..
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://rag:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/rag_central
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      INVITE_CODE: ${INVITE_CODE:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      DEBUG: ${DEBUG:-false}
      DOWNLOADS_DIR: /app/downloads
    volumes:
      - uploads:/app/uploads
      - downloads:/app/downloads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  admin:
    <<: *common
    image: nginx:alpine
    ports:
      - "${ADMIN_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - website_dist:/usr/share/nginx/html:ro
      - admin_dist:/usr/share/nginx/admin:ro
      - downloads:/usr/share/nginx/downloads:ro
    depends_on:
      server:
        condition: service_healthy

  admin-build:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_BASE_PATH: /admin/
      VITE_ADMIN_API_BASE: "/api/central/v1"
      npm_config_registry: https://registry.npmmirror.com
    volumes:
      - ../admin-frontend:/app
      - admin_dist:/output
    command: sh -c "npm ci --prefer-offline && npm run build -- --outDir /output"
    profiles:
      - build

  website-copy:
    image: alpine
    volumes:
      - ../website:/src:ro
      - website_dist:/output
    command: sh -c "rm -rf /output/* && cp -r /src/* /output/"
    profiles:
      - build

volumes:
  pgdata:
  redisdata:
  uploads:
  downloads:
  admin_dist:
  website_dist:
