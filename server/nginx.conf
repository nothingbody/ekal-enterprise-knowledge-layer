server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 500m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # API requests → backend server
    location /api/ {
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
    }

    location = /docs {
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
    }

    location = /openapi.json {
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
    }

    # Admin panel → /admin/ path
    location ^~ /admin {
        root /usr/share/nginx;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # Backward-compatible public links generated before the user frontend was
    # mounted under /app/.
    location /share/ {
        return 302 /app$request_uri;
    }

    location /invite/ {
        return 302 /app$request_uri;
    }

    # Desktop installer downloads
    location /downloads/ {
        alias /usr/share/nginx/downloads/;
        autoindex off;
        add_header Content-Disposition 'attachment';
        add_header Cache-Control "public, max-age=86400";
    }

    # Official website → root path
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
        error_page 404 /404.html;
    }

    # Website static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
