x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ── 基础设施 ──
  postgres:
    <<: *common
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: rag_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_platform"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    <<: *common
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass "${REDIS_PASSWORD:-redis_internal_pass}"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_internal_pass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

  # ── 中心服务器 (server) ──
  server:
    <<: *common
    build:
      context: ..
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://rag:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/rag_central"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-redis_internal_pass}@redis:6379/0"
      SECRET_KEY: "${SERVER_SECRET_KEY:?SERVER_SECRET_KEY is required}"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      INVITE_CODE: ${INVITE_CODE:-}
      ADMIN_EMAIL: "${ADMIN_EMAIL:?ADMIN_EMAIL is required}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}"
      DEBUG: ${DEBUG:-false}
      # 必须与 appuser 可写目录一致（勿用 /usr/share/nginx/...，卷为 root 属主会导致上传 500）
      DOWNLOADS_DIR: /app/downloads
    volumes:
      - server_uploads:/app/uploads
      - downloads:/app/downloads
      - ../skills:/app/skills:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g

  # ── 节点后端 (backend) ──
  backend:
    <<: *common
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://rag:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/rag_platform"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-redis_internal_pass}@redis:6379/1"
      SECRET_KEY: "${BACKEND_SECRET_KEY:?BACKEND_SECRET_KEY is required}"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      CHROMA_MODE: embedded
      CHROMA_DATA_DIR: /app/data/chroma
      UPLOAD_DIR: /app/uploads
      DEBUG: ${DEBUG:-false}
      CENTRAL_SERVER_URL: http://server:8080
      CLOUD_REQUIRE_HTTPS: "false"
    volumes:
      - backend_uploads:/app/uploads
      - backend_data:/app/data
      - ../skills:/app/skills:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2g

  celery-worker:
    <<: *common
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: celery -A app.celery_app:celery worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: "postgresql+asyncpg://rag:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/rag_platform"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-redis_internal_pass}@redis:6379/1"
      SECRET_KEY: "${BACKEND_SECRET_KEY:?BACKEND_SECRET_KEY is required}"
      CHROMA_MODE: embedded
      CHROMA_DATA_DIR: /app/data/chroma
      UPLOAD_DIR: /app/uploads
    volumes:
      - backend_uploads:/app/uploads
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g

  # ── Nginx 网关 ──
  nginx:
    <<: *common
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - website_dist:/usr/share/nginx/html:ro
      - admin_dist:/usr/share/nginx/admin:ro
      - frontend_dist:/usr/share/nginx/app:ro
      - downloads:/usr/share/nginx/downloads:ro
    depends_on:
      server:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ── 构建任务 (按需运行) ──
  admin-build:
    image: node:20-alpine
    working_dir: /workspace/admin-frontend
    environment:
      VITE_BASE_PATH: /admin/
      VITE_ADMIN_API_BASE: "/api/central/v1"
      npm_config_registry: https://registry.npmmirror.com
    volumes:
      - ../admin-frontend:/workspace/admin-frontend
      - ../shared-frontend:/workspace/shared-frontend
      - admin_dist:/output
    command: sh -c 'export VITE_ADMIN_API_BASE="$${VITE_ADMIN_API_BASE:-/api/central/v1}" && cd /workspace/shared-frontend && npm ci --prefer-offline && npm run build && cd /workspace/admin-frontend && npm ci --prefer-offline && npm run build -- --outDir /output --emptyOutDir'
    profiles:
      - build

  frontend-build:
    image: node:20-alpine
    working_dir: /workspace/frontend
    environment:
      VITE_BASE_PATH: /app/
      VITE_API_BASE_URL: ""
      npm_config_registry: https://registry.npmmirror.com
    volumes:
      - ../frontend:/workspace/frontend
      - ../shared-frontend:/workspace/shared-frontend
      - frontend_dist:/output
    command: sh -c "cd /workspace/shared-frontend && npm ci --prefer-offline && npm run build && cd /workspace/frontend && npm ci --prefer-offline && npm run build -- --outDir /output"
    profiles:
      - build

  website-copy:
    image: alpine
    volumes:
      - ../website:/src:ro
      - website_dist:/output
    command: sh -c "rm -rf /output/* && cp -r /src/* /output/"
    profiles:
      - build

volumes:
  pgdata:
  redisdata:
  server_uploads:
  backend_uploads:
  backend_data:
  downloads:
  admin_dist:
  frontend_dist:
  website_dist:
