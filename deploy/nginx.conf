# ── Rate limiting zones ──
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_chat:10m rate=10r/s;

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 500m;

    # ── Security Headers ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Hide server version ──
    server_tokens off;

    # ── Auth API: Central server auth (rate limited strictly) ──
    location ~ ^/api/central/v1/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        limit_req_status 429;

        rewrite ^/api/central/v1/(.*)$ /api/v1/$1 break;
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # ── Auth API: Backend auth (rate limited strictly) ──
    location ~ ^/api/v1/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # ── Chat API (moderate rate limit, long timeout for streaming) ──
    location ~ ^/api/v1/chat/ {
        limit_req zone=api_chat burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Central server API ──
    location /api/central/v1/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;

        rewrite ^/api/central/v1/([^./]+)$ /api/central/v1/$1/ last;
        rewrite ^/api/central/v1/(.*)$ /api/v1/$1 break;
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Backend API ──
    location /api/v1/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Server API fallback ──
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Block OpenAPI docs in production ──
    location = /docs { return 404; }
    location = /openapi.json { return 404; }

    # ── User frontend (/app/) ──
    location ^~ /app {
        root /usr/share/nginx;
        index index.html;
        try_files $uri $uri/ /app/index.html;
    }

    # ── Admin frontend (/admin/) ──
    location ^~ /admin {
        root /usr/share/nginx;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # Backward-compatible public links generated before the user frontend was
    # mounted under /app/.
    location /share/ {
        return 302 /app$request_uri;
    }

    location /invite/ {
        return 302 /app$request_uri;
    }

    # Desktop installer downloads
    location /downloads/ {
        alias /usr/share/nginx/downloads/;
        autoindex off;
        add_header Content-Disposition 'attachment';
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Website (/) ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
        error_page 404 /404.html;
    }

    # Static assets long-term cache for SPA hashed bundles
    location ~* ^/(app|admin)/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /usr/share/nginx;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static assets cache for website
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
